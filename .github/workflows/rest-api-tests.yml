name: Automated API tests using Postman CLI

on:
  workflow_call:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    paths:
      - "services/rest/**"

jobs:
  automated-api-tests:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:latest
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://testuser:testpassword@localhost:5432/testdb

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        working-directory: services/rest
        run: npm ci

      - name: Run migration and seeder
        working-directory: services/rest
        run: npm run prepare

      - name: Run REST API in background
        working-directory: services/rest
        run: |
          npm start > /tmp/rest-api.log 2>&1 &
          echo "API PID: $!"

      - name: Wait for REST API
        run: |
          for i in {1..15}; do
            if curl -sSf http://localhost:3000/authors > /dev/null; then
              echo "REST API is ready"
              exit 0
            fi
            sleep 2
          done
          echo "REST API failed to start"
          cat /tmp/rest-api.log
          exit 1

      - name: Install Postman CLI
        run: |
          curl -o- "https://dl-cli.pstmn.io/install/linux64.sh" | sh

      - name: Login to Postman CLI
        run: postman login --with-api-key ${{ secrets.REST_POSTMAN_API_KEY }}

      - name: Run API tests
        run: |
          postman collection run "48703513-142b47eb-5990-44ff-8190-b7531a8632cd"

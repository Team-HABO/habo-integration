name: Service SOAP CI

on:
  workflow_call:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    paths:
      - "services/soap/**"

jobs:
  automated-soap-api-tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        working-directory: services/soap
        run: docker build -t soap-service .

      - name: Run SOAP service container
        run: docker run -d --name soap-service -p 8080:8080 soap-service

      - name: Wait for SOAP service
        run: |
          for i in {1..15}; do
            if curl -sSf http://localhost:8080/health > /dev/null; then
              echo "SOAP service is ready"
              exit 0
            fi
            sleep 2
          done
          echo "SOAP service failed to start"
          docker logs soap-service
          exit 1

      - name: Install Postman CLI
        run: |
          curl -o- "https://dl-cli.pstmn.io/install/linux64.sh" | sh

      - name: Login to Postman CLI
        run: postman login --with-api-key ${{ secrets.SOAP_POSTMAN_API_KEY }}

      - name: Run API tests
        run: |
          postman collection run "53145194-b2dddcee-253f-4604-b29a-8724ed451bd1" \
            --env-var "baseURL=localhost:8080"


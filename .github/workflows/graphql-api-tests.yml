name: Service GraphQL CI

on:
  workflow_call:
  push:
    branches:
      - main
      - initgraphql
    paths:
      - "services/graph/**"
  pull_request:
    branches:
      - main
    paths:
      - "services/graph/**"
  workflow_dispatch:

defaults:
  run:
    working-directory: services/graph

jobs:
  automated-api-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: "services/graph/package-lock.json"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Prisma Validate
        run: npx prisma validate

      - name: Build check
        run: npx tsc --noEmit

      - name: Start GraphQL Server in Background
        run: npm start &

      - name: Wait for Server to be Ready
        run: npx wait-on http://localhost:4000/live --timeout 60000

      - name: Run Postman tests
        run: npx newman run ./postman-tests/graph-api-tests.json -e ./postman-tests/graph-api-tests-env.json

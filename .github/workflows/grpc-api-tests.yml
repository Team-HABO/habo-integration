name: Service gRPC CI

on:
  workflow_call:
  push:
    branches:
      - main
    paths:
      - "services/grpc/**"
  pull_request:
    branches:
      - main
    paths:
      - "services/grpc/**"
  workflow_dispatch:

defaults:
  run:
    working-directory: services/grpc

jobs:
  grpc-service-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: "services/grpc/requirements.txt"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate protobuf code
        run: |
          python -m grpc_tools.protoc \
            -I./proto \
            --python_out=./src/generated \
            --grpc_python_out=./src/generated \
            ./proto/library.proto

      - name: Fix generated imports
        run: sed -i 's/import library_pb2/from src.generated import library_pb2/' ./src/generated/library_pb2_grpc.py

      - name: Start gRPC server in background
        run: python -m src.server &

      - name: Wait for server to be ready
        run: |
          for i in {1..10}; do
            if python -c "
          import grpc
          from src.generated import library_pb2, library_pb2_grpc
          channel = grpc.insecure_channel('localhost:50051')
          stub = library_pb2_grpc.LibraryServiceStub(channel)
          stub.GetBookById(library_pb2.GetBookByIdRequest(book_id=1000), timeout=2)
          print('Server is ready')
          " 2>/dev/null; then
              exit 0
            fi
            sleep 2
          done
          echo "gRPC server failed to start"
          exit 1

      - name: Test GetBookById (existing book)
        run: |
          python -c "
          import grpc
          from src.generated import library_pb2, library_pb2_grpc
          channel = grpc.insecure_channel('localhost:50051')
          stub = library_pb2_grpc.LibraryServiceStub(channel)
          response = stub.GetBookById(library_pb2.GetBookByIdRequest(book_id=1000))
          assert response.book_id == 1000, f'Expected book_id 1000, got {response.book_id}'
          assert response.title != '', 'Expected non-empty title'
          print(f'GetBookById OK: {response.title}')
          "

      - name: Test GetBookById (not found)
        run: |
          python -c "
          import grpc
          from src.generated import library_pb2, library_pb2_grpc
          channel = grpc.insecure_channel('localhost:50051')
          stub = library_pb2_grpc.LibraryServiceStub(channel)
          try:
              stub.GetBookById(library_pb2.GetBookByIdRequest(book_id=999999))
              print('ERROR: Expected NOT_FOUND')
              exit(1)
          except grpc.RpcError as e:
              assert e.code() == grpc.StatusCode.NOT_FOUND, f'Expected NOT_FOUND, got {e.code()}'
              print('GetBookById NOT_FOUND OK')
          "

      - name: Test CreateBook
        run: |
          python -c "
          import grpc
          from src.generated import library_pb2, library_pb2_grpc
          channel = grpc.insecure_channel('localhost:50051')
          stub = library_pb2_grpc.LibraryServiceStub(channel)
          response = stub.CreateBook(library_pb2.CreateBookRequest(
              title='CI Test Book',
              author_id=1,
              publishing_company_id=1,
              publishing_year=2024
          ))
          assert response.book_id > 0, f'Expected positive book_id, got {response.book_id}'
          print(f'CreateBook OK: new book_id={response.book_id}')
          "

      - name: Test CreateBook validation (invalid author)
        run: |
          python -c "
          import grpc
          from src.generated import library_pb2, library_pb2_grpc
          channel = grpc.insecure_channel('localhost:50051')
          stub = library_pb2_grpc.LibraryServiceStub(channel)
          try:
              stub.CreateBook(library_pb2.CreateBookRequest(
                  title='Bad Book',
                  author_id=999999,
                  publishing_company_id=1,
                  publishing_year=2024
              ))
              print('ERROR: Expected INVALID_ARGUMENT')
              exit(1)
          except grpc.RpcError as e:
              assert e.code() == grpc.StatusCode.INVALID_ARGUMENT, f'Expected INVALID_ARGUMENT, got {e.code()}'
              print('CreateBook validation OK')
          "

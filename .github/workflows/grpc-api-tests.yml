name: Service gRPC CI

on:
  workflow_call:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    paths:
      - "services/grpc/**"

jobs:
  automated-grpc-tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        working-directory: services/grpc
        run: docker build -t grpc-service .

      - name: Run gRPC service container
        run: docker run -d --name grpc-service -p 50051:50051 grpc-service

      - name: Install grpcurl
        run: |
          curl -sSL https://github.com/fullstorydev/grpcurl/releases/download/v1.9.1/grpcurl_1.9.1_linux_amd64.tar.gz | tar xz
          sudo mv grpcurl /usr/local/bin/

      - name: Wait for gRPC service
        run: |
          for i in {1..15}; do
            if grpcurl -plaintext localhost:50051 list > /dev/null 2>&1; then
              echo "gRPC service is ready"
              exit 0
            fi
            sleep 2
          done
          echo "gRPC service failed to start"
          docker logs grpc-service
          exit 1

      - name: Run gRPC tests
        run: |
          echo "Test 1: GetBookById (existing)"
          grpcurl -plaintext -d '{"book_id": 1000}' localhost:50051 library.LibraryService/GetBookById

          echo "Test 2: GetBookById (not found)"
          grpcurl -plaintext -d '{"book_id": 999999}' localhost:50051 library.LibraryService/GetBookById 2>&1 && exit 1 || true

          echo "Test 3: CreateBook"
          grpcurl -plaintext -d '{"title": "CI Test", "author_id": 1, "publishing_company_id": 1, "publishing_year": 2024}' localhost:50051 library.LibraryService/CreateBook

          echo "Test 4: CreateBook (invalid author)"
          grpcurl -plaintext -d '{"title": "Bad", "author_id": 999999, "publishing_company_id": 1, "publishing_year": 2024}' localhost:50051 library.LibraryService/CreateBook 2>&1 && exit 1 || true

          echo "All gRPC tests passed!"
